<body>

<header>
	<a href="main">
		<div class="logo">짱구 캠핑장!</div>
	</a>
	<nav class="menu">
		<a href="notice_board">공지사항</a> <a href="reservation_form">예약하기</a> <a href="#contact">문의하기</a> <a href="#events">이벤트</a>
	</nav>
</header>

<main>
	<div class="left-section">
		<div class="auth-section">
			<h2>회원 관리</h2>
			<th:block th:if="${session.id == null}">			<!-- 로그인이 되었는지 확인 -->
				<div class="login" name="login_form">로그인</div>
				<div class="signup">회원가입</div>
			</th:block>
			<th:block th:unless="${session.id == null}">		<!-- 로그인이 되었는지 확인 -->
				<div class="myPage" name="myPage">마이페이지</div>
				<input type="button" value="로그아웃" name="logout">
			</th:block>	
		</div>
		<div class="events">
			<h2>이벤트 게시판</h2>
			<div class="events-list">
				<!-- 이벤트 항목 -->
			</div>
		</div>
	</div>

	<div class="right-section">
		<div id="error-message" th:if="${errorMessage != null}" th:text="${errorMessage}" style="color: red;"></div>
		<div class="reservation" style="height: 705px;">
			<form name="reservation_insert" th:action="@{/reservation_insert(id=${id})}" th:object="${vo}" method="post">
			<input type="hidden" th:value="${id}">
			<input type="hidden" name="price" id="priceHidden">
				<table border="1" align="center">
					<caption>:::캠핑장 예약:::</caption>
					<tr>
						<th>날짜</th>
						<td><input type="text" th:field="*{date}" id="datepicker" name="date"></td>
						<th>인원 수</th>
						<td><input type="number" min="1" max="10" th:field="*{num_people}" name="num_people" id="numberInput"></td>
					</tr>
					<tr>
						<td colspan="4" class="test">
							<div class="t1">
								<input type="checkbox" value="A1" name="camping_idx" id="A1"><label for="A1">A1</label> 
								<input type="checkbox" value="A2" name="camping_idx" id="A2"><label for="A2">A2</label> 
								<input type="checkbox" value="A3" name="camping_idx" id="A3"><label for="A3">A3</label> 
								<input type="checkbox" value="A4" name="camping_idx" id="A4"><label for="A4">A4</label> 
								<input type="checkbox" value="A5" name="camping_idx" id="A5"><label for="A5">A5</label>
							</div>
							<div class="t1"> 
								<input type="checkbox" value="B1" name="camping_idx" id="B1"><label for="B1">B1</label> 
								<input type="checkbox" value="B2" name="camping_idx" id="B2"><label for="B2">B2</label> 
								<input type="checkbox" value="B3" name="camping_idx" id="B3"><label for="B3">B3</label> 
								<input type="checkbox" value="B4" name="camping_idx" id="B4"><label for="B4">B4</label> 
								<input type="checkbox" value="B5" name="camping_idx" id="B5"><label for="B5">B5</label>
							</div>
							<div class="t1">
								<input type="checkbox" value="C1" name="camping_idx" id="C1"><label for="C1">C1</label> 
								<input type="checkbox" value="C2" name="camping_idx" id="C2"><label for="C2">C2</label> 
								<input type="checkbox" value="C3" name="camping_idx" id="C3"><label for="C3">C3</label> 
								<input type="checkbox" value="C4" name="camping_idx" id="C4"><label for="C4">C4</label> 
								<input type="checkbox" value="C5" name="camping_idx" id="C5"><label for="C5">C5</label>
							</div>
							<div class="t1">
								<input type="checkbox" value="D1" name="camping_idx" id="D1"><label for="D1">D1</label> 
								<input type="checkbox" value="D2" name="camping_idx" id="D2"><label for="D2">D2</label> 
								<input type="checkbox" value="D3" name="camping_idx" id="D3"><label for="D3">D3</label> 
								<input type="checkbox" value="D4" name="camping_idx" id="D4"><label for="D4">D4</label> 
								<input type="checkbox" value="D5" name="camping_idx" id="D5"><label for="D5">D5</label>
							</div>
							<div class="t1">
								<input type="checkbox" value="E1" name="camping_idx" id="E1"><label for="E1">E1</label> 
								<input type="checkbox" value="E2" name="camping_idx" id="E2"><label for="E2">E2</label> 
								<input type="checkbox" value="E3" name="camping_idx" id="E3"><label for="E3">E3</label> 
								<input type="checkbox" value="E4" name="camping_idx" id="E4"><label for="E4">E4</label> 
								<input type="checkbox" value="E5" name="camping_idx" id="E5"><label for="E5">E5</label>
			
							</div>
						</td>
					</tr>
					<tr>
						<td colspan="4" align="center">
							<p id="price"></p>
							<input type="button" value="예약하기" name="join" id="reserveButton"> 
							<a href="/main"> 
								<input type="button" value="취소" name="cancel">
							</a>
						</td>
					</tr>
				</table>
			</form>
		</div>
	</div>
</main>

<footer>
	<div class="contact">
		<p>
			문의사항이 있으면 전화해 주세요: <a href="tel:+123456789">+123456789</a>
		</p>
	</div>
	<div class="weather">
		<p>
			현재 날씨: <span id="weather-info">정보 로딩 중...</span>
		</p>
	</div>
</footer>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<script>
	//오류 메시지 요소의 내용을 자바스크립트로 읽어오기
	var errorMessageElement = document.getElementById('error-message');
	if (errorMessageElement) {
		var errorMessage = errorMessageElement.textContent || errorMessageElement.innerText;			// 컨트롤러에서 에러 메세지 가져오기
		console.log('Error Message:', errorMessage); // 콘솔에서 확인
	}
	
	// 가격
	function updatePrice() {
	    var numPeople = parseInt(document.getElementById('numberInput').value, 10);						
	    var priceElement = document.getElementById('price');
	    var priceHiddenElement = document.getElementById('priceHidden');								// hidden에다가 값을 보냄
	    var price = 0;
	    if (numPeople > 0) {
	        if (numPeople <= 2) {
	            price = numPeople * 10000;																// 2명까지는 인당 만원
	        } else {
	            price = 2 * 10000 + (numPeople - 2) * 3000;												// 3명부터는 추가 요금 3천원 추가!
	        }
	    }
	    priceElement.textContent = '금액: ' + price.toLocaleString() + '원';								// 출력할 금액
	    priceHiddenElement.value = price; // 숨겨진 필드에 금액 저장
	}
	
	// 초기 금액 설정
	document.getElementById('numberInput').value = 1; // 기본값을 1로 설정
	updatePrice();																						// 함수 동작
	
	// 인원 수 변경 시 금액 업데이트
	document.getElementById('numberInput').addEventListener('input', updatePrice);
	
	$(function() {
		// 날짜 선택기 초기화
		$("#datepicker").datepicker({
			dateFormat: 'yy-mm-dd',
			minDate: 0, // 오늘 날짜 이후만 선택 가능
			maxDate: "+1M +10D", // 현재 날짜로부터 1개월 + 10일 이내로 선택 가능
			changeMonth: true, // 월 변경 가능
			changeYear: true, // 연도 변경 가능
			onSelect: function() {
				// 날짜가 선택될 때 모든 체크박스를 초기화
				$("input[type='checkbox']").prop('checked', false);
			}
		});
		
		// 예약하기 버튼 클릭 시 날짜 값을 확인
		$("#reserveButton").on("click", function(event) {
			var selectedDate = $("#datepicker").val(); // 선택된 날짜 가져오기
			if (!selectedDate) {
				alert('날짜를 선택해 주세요!');
			} else {
				console.log('선택된 날짜:', selectedDate); // 콘솔에서 선택된 날짜 확인
				$("form[name='reservation_insert']").submit(); // 폼 제출
			}
		});

		// 체크박스를 하나만 선택하도록 설정
		$(document).on('click', "input[type='checkbox']", function() {
			const checkboxes = $("input[type='checkbox']");
			if (this.checked) {
				checkboxes.not(this).prop('checked', false);
			}
		});

		// 예약하기 버튼 클릭 시 폼 제출
		$("input[name='join']").on("click", function() {
			$("form[name='reservation_insert']").submit();
		});
	});
	
	//임시 로그인------------------------------------
	
	//로그인form 버튼
	let $loginFormButton = $("div[name='login_form']")
	$loginFormButton.on("click", function(){
		window.location.href="/login_form";	
	})
	
	//-----------------------------------------------
	
	//마이페이지---------------------------------------
	let $myPagebutton = $("div[name='myPage']")
	$myPagebutton.on("click", function(){
		window.location.href="/myPage_form";
	})
	//-----------------------------------------------
	
	document.getElementById('numberInput').value = 1; // 기본값을 1로 설정
	
    // 로그아웃
    let $logoutButton = $("input[name='logout']");

	$logoutButton.on("click", function() {
		location.href="/logout";
	})
</script>
</body>
</html>
