<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>★로 그 인★</title>

<style type="text/css">

	a{
		text-decoration: none;
	}
	
	table{
		border-collapse: collapse;
	}
	

</style>

</head>
<body>

	<form th:action="@{/login}" name="f" th:object="${vo}" method="post">
	
		<table border="1" align="center">
		
			<tr>
				<th>아이디</th>
				<td><input th:field="*{id}" name="id"></td>
			</tr>
			
			<tr>
				<th>비밀번호</th>
				<td><input th:field="*{password}" type="password"></td>
			</tr>
			
			<tr>
				<td colspan="2" align="center">
					<input type="button" value="로그인" name="login">
				</td>
			</tr>
		
		</table>
	
	
	</form>


</body>


	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
	
	<script th:inline="javascript">
	
	let $loginButton = $("input[name='login']");
	
	$loginButton.on("click", function(){
		
		let $id = $("input[name='id']").val();
		let $pwd = $("input[type='password']").val();
		
		if($id == ''){
			alert('아이디를 입력하세요')
			return;
		}
		
		if($pwd == ''){
			alert('비밀번호를 입력하세요')
			return;
		}
		
		$.ajax({
			url:"/login",
			type:"post",
			data:JSON.stringify({'id' : $id, 'password' : $pwd}),
			dataType:"JSON",
			contentType:"application/json; charset=utf-8",
			success:function(data){
				if(data['param'] == 'no_id'){
					alert('아이디가 없습니다')
					return;
				}
				
				if(data['param'] == 'no_pwd'){
					alert('비밀번호가 일치하지 않습니다')
					return;
				}
				
				alert("로그인 성공");
				window.location.href="/main";
			}
		
		})
		
		
		
		
	})
	
	
	</script>



</html>
