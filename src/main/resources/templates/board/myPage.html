<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title>myPage</title>



<style type="text/css">
* {
	font-family: 'Gowun Dodum', sans-serif;
}

a {
	text-decoration: none;
}

a:hover {
	color: #4CAF50;
}

.container {
	text-align: center;
}

div.column {
	margin: 20px;
}

input::placeholder {
	color: #A2E882;
}

.user-form {
	border-radius: 30px;
	margin: auto;
	width: 500px;
	height: 70px;
	font-size: 20px;
}
</style>


</head>
<body>

	<div class="container">

		<div class="text-main">
			<h1>MyPage</h1>
		</div>




		<form class="user" th:action="@{/myPage}" name="f" method="post">
			<input type="hidden" class="user-form" id="idx" name="idx"
				value="*{idx}">

			<div class="form-group">
				<div class="column">
					<input type="text" class="user-form" id="myId" name="myId"
						style="text-align: center;" th:text="${vo.id}"
						readonly="readonly">
				</div>
			</div>

			<div class="form-group">
				<div class="column">
					<input type="text" class="user-form" id="myName" name="myName"
						style="text-align: center;" th:text="${vo.nickName}"
						readonly="readonly">
				</div>
			</div>

			<div class="form-group">
				<div class="column">
					<input type="text" class="user-form" id="myEmail" name="myEmail"
						style="text-align: center;" th:text="${vo.email}"
						readonly="readonly">
				</div>
			</div>

			<div class="form-group">
				<div class="column">
					<input type="text" class="user-form" id="myBirth" name="myBirth"
						style="text-align: center;" th:text="${vo.birth}"
						readonly="readonly">
				</div>
			</div>

			<div class="form-group">
				<div class="column">
					<input class="user-form" id="myPhone" name="myPhone"
						style="text-align: center;" th:text="${vo.phoneNumber}"
						readonly="readonly">
				</div>
			</div>


			<!-- 
  	<div class="form-group">
 		<div class="column">
	 		<input type="text" class="user-form" id="myPwd" name="myPwd"
	 		       style="text-align: center;"  placeholder="비밀번호" required>
 		</div>
 	</div>
 	
 	<div class="form-group">
 		<div class="column">
	 		<input type="text" class="user-form" id="inPwd" name="inPwd"
	 		       style="text-align: center;"   placeholder="비밀번호 확인" required>
 		</div>
 	</div>
 -->


			<a href="#" class="modify-btn" name="modify_mypage">수정하기 &emsp;</a>
			<a th:href="@{main}" class="btn_userMain">메인으로 가기</a>


		</form>






	</div>




</body>



<script src="https://code.jquery.com/jquery-3.7.1.js"></script>

<script th:inline="javascript">
	
	const $modiButton = $("a[name='modify_mypage']")
	
	$modiButton.on("click", function(){
		
		window.location.href="/modify_mypage";
	})
	
	

	
	</script>




</html>
